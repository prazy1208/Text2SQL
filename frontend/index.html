<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Text2SQL — Multi-Agent Pipeline Demo</title>
  <link rel="stylesheet" href="styles.css?v=20" />
</head>
<body>
  <div class="app layout">
    <header class="header header--compact">
      <div class="header-brand">
        <h1>Text2SQL</h1>
        <p class="tagline">Natural Language to SQL &mdash; Multi-Agent Pipeline Demo</p>
      </div>
      <div class="header-badge">PyCon 2026</div>
    </header>

    <main class="main main--chatbot">
      <div class="main-layout">
        <aside class="chat-sidebar" aria-label="Chats">
          <div class="chat-sidebar-header">
            <button type="button" id="new-chat-btn" class="btn btn-primary btn-sidebar-new">New chat</button>
          </div>
          <div id="chat-list" class="chat-list" role="list"></div>
        </aside>

        <div class="main-column">
          <div id="chat-scroll" class="chat-scroll">
            <div id="output-placeholder" class="output-placeholder">
              <div id="welcome-panel" class="welcome-panel"></div>
            </div>
            <div id="output-content" class="output-content hidden">
              <div id="chat-thread" class="chat-thread"></div>
              <div id="intent-actions" class="intent-actions hidden">
                <p id="intent-actions-label" class="intent-actions-label">Is this understanding correct?</p>
                <div class="intent-actions-buttons">
                  <button type="button" id="intent-yes-btn" class="btn btn-secondary">Yes</button>
                  <button type="button" id="intent-no-btn" class="btn btn-secondary btn-secondary-muted">No</button>
                </div>
              </div>
            </div>
          </div>

          <div id="pipeline-progress" class="pipeline-progress hidden">
            <div class="pipeline-steps">
              <div class="pipeline-step" data-step="intent"><span class="pipeline-step-dot"></span><span class="pipeline-step-label">Intent</span></div>
              <div class="pipeline-connector"></div>
              <div class="pipeline-step" data-step="tables"><span class="pipeline-step-dot"></span><span class="pipeline-step-label">Tables</span></div>
              <div class="pipeline-connector"></div>
              <div class="pipeline-step" data-step="columns"><span class="pipeline-step-dot"></span><span class="pipeline-step-label">Columns</span></div>
              <div class="pipeline-connector"></div>
              <div class="pipeline-step" data-step="fewshot"><span class="pipeline-step-dot"></span><span class="pipeline-step-label">Few-Shot</span></div>
              <div class="pipeline-connector"></div>
              <div class="pipeline-step" data-step="sql"><span class="pipeline-step-dot"></span><span class="pipeline-step-label">SQL</span></div>
            </div>
          </div>

          <div id="output-error" class="output-error output-error--composer hidden"></div>

          <form id="query-form" class="composer" autocomplete="off">
            <div class="composer-row">
              <div id="domain-selector" class="domain-selector" role="radiogroup" aria-label="Select domain">
                <!-- Domain buttons rendered by JS -->
              </div>
              <label class="sr-only" for="use-case">Use case</label>
              <select id="use-case" class="composer-use-case hidden" aria-label="Use case">
                <option value="">Select Domain</option>
              </select>
              <label class="sr-only" for="message">Question</label>
              <textarea
                id="message"
                class="composer-message"
                rows="1"
                placeholder="Ask a question about your data..."
                aria-label="Your question"
              ></textarea>
              <button type="submit" class="btn btn-primary composer-send" id="submit-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <p id="composer-status" class="composer-status hidden" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div
    id="delete-confirm-modal"
    class="modal-overlay hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-confirm-title"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <h2 id="delete-confirm-title" class="modal-title">Delete this chat?</h2>
      <p class="modal-body">This removes the conversation from your history. It cannot be undone.</p>
      <div class="modal-actions">
        <button type="button" id="delete-confirm-cancel" class="btn btn-modal-secondary">Cancel</button>
        <button type="button" id="delete-confirm-delete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=20"></script>
</body>
</html>
