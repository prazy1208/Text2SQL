<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Text2SQL — Chat</title>
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>
  <div class="app layout">
    <header class="header header--compact">
      <div class="header-brand">
        <h1>Text2SQL</h1>
        <p class="tagline">Natural language to intent, schema selection, and generated SQL</p>
      </div>
      <div class="header-session" aria-live="polite">
        <span class="header-session-label">Session</span>
        <code id="session-id" class="header-session-id">—</code>
      </div>
    </header>

    <main class="main main--chatbot">
      <div id="chat-scroll" class="chat-scroll">
        <div id="output-placeholder" class="output-placeholder">Submit a question to start the conversation.</div>
        <div id="output-content" class="output-content hidden">
          <div id="chat-thread" class="chat-thread"></div>
          <div id="intent-actions" class="intent-actions hidden">
            <p id="intent-actions-label" class="intent-actions-label">Is this understanding correct?</p>
            <div class="intent-actions-buttons">
              <button type="button" id="intent-yes-btn" class="btn btn-secondary">Yes</button>
              <button type="button" id="intent-no-btn" class="btn btn-secondary btn-secondary-muted">No</button>
            </div>
          </div>
        </div>
      </div>

      <div id="output-error" class="output-error output-error--composer hidden"></div>

      <form id="query-form" class="composer" autocomplete="off">
        <div class="composer-row">
          <label class="sr-only" for="use-case">Use case</label>
          <select id="use-case" class="composer-use-case" required aria-label="Use case">
            <option value="">Domain…</option>
          </select>
          <label class="sr-only" for="message">Question</label>
          <textarea
            id="message"
            class="composer-message"
            rows="1"
            placeholder="Ask a question…"
            required
            aria-label="Your question"
          ></textarea>
          <button type="submit" class="btn btn-primary composer-send" id="submit-btn">Send</button>
        </div>
        <p id="composer-status" class="composer-status hidden" role="status" aria-live="polite"></p>
      </form>
    </main>
  </div>
  <script src="app.js?v=12"></script>
</body>
</html>
